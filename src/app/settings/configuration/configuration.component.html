<!-- Search & Settings Bar  -->

<div class="list-table table">

  <table>

    <thead>
    <tr>
      <th class="text-center">Sr#</th>
      <th>Title</th>
      <th >Config Key</th>
      <th >Config Value</th>
      <th class="text-center">Actions</th>
    </tr>
    </thead>
    <tbody>

    <tr *ngIf="!DataFound">
      <td colspan="100" class="text-center align-middle">
        no result found
      </td>
    </tr>

    <ng-container *ngIf="DataFound">
      <tr *ngFor="let config of (categories$ | async) ?? []  |  paginate: { id: 'categoryPagination', itemsPerPage: perPage, currentPage: p, totalItems: total}; let i = index">
        <td class="text-center">{{(p - 1) * perPage + i + 1}}</td>
        <td>{{config.placeholder}}</td>
        <td >
          {{config.config_key}}
        </td>
        <td>{{config.config_val}}</td>
        <td class="text-center">
          <div class="dropdown">
            <button class="btn btn-secondary dropdown-toggle action-btn" type="button" data-bs-toggle="dropdown"
                    aria-expanded="false">
              <img src="assets/css/sprite_images/images/other-actions-icon.png" alt="Action" />
            </button>
            <ul class="dropdown-menu">
              <!--                @if(category.product === null || category.product === ''){-->
              <li>
                <button class="dropdown-item edit-btn" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" >
                  <img src="assets/css/sprite_images/images/edit-img.png" alt="Edit">
                  Edit
                </button>
              </li>
              <!--                }-->
              <li>
                <button class="dropdown-item edit-btn" data-bs-toggle="offcanvas" data-bs-target="#addFeature" aria-controls="addFeature" >
                  <img src="assets/css/sprite_images/images/edit-img.png" alt="Edit">
                  Add/Edit Features
                </button>
              </li>
              <li>
                <button class="dropdown-item clone-btn">
                  <img src="assets/css/sprite_images/images/clone-img.png" alt="Clone">
                  Clone
                </button>
              </li>


                <li>
                  <button class="dropdown-item edit-btn" data-bs-toggle="modal" data-bs-target="#deletePopup">
                    <img src="assets/css/sprite_images/images/delete-img.png" alt="Delete">
                    Delete
                  </button>
                </li>

            </ul>
          </div>
        </td>
      </tr>
    </ng-container>

    </tbody>
  </table>
</div>
<div class="has-text-centered pb-2">
  <pagination-controls *ngIf="DataFound" (pageChange)="getPage($event)" id="categoryPagination"></pagination-controls>
</div>
