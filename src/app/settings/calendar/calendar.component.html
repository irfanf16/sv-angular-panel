<!-- add model -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
  <app-spinner-component *ngIf="spinner"></app-spinner-component>
  <div class="offcanvas-header">
    <h5 id="offcanvasRightLabel">Add Holiday</h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"
            #closeBtn></button>
  </div>
  <div class="offcanvas-body">
    <div class="form-container">
        <div class="card card-s">

          <div class="card-body">
            <form [formGroup]="addHolidayForm">

              <!-- Holiday Name -->
              <div class="mb-3">
                <label for="title" class="form-label">Holiday Name</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="Enter holiday name" formControlName="title" >
              </div>

              <!-- Date Selection -->
              <div class="mb-3">
                <label for="date" class="form-label">Holiday Date</label>
                <input type="date" class="form-control" id="date" formControlName="dates" name="dates">
              </div>

              <!-- Time Slot Selection -->
<!--              <div class="row">-->
<!--                <div class="col-md-6 mb-3">-->
<!--                  <label for="startTime" class="form-label">Start Time</label>-->
<!--                  <input type="time" class="form-control" id="startTime" name="startTime">-->
<!--                </div>-->
<!--                <div class="col-md-6 mb-3">-->
<!--                  <label for="endTime" class="form-label">End Time</label>-->
<!--                  <input type="time" class="form-control" id="endTime" name="endTime">-->
<!--                </div>-->
<!--              </div>-->

              <!-- Description -->
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="3" placeholder="Describe the holiday" formControlName="description" name="description"></textarea>
              </div>

              <!-- Submit Button -->
              <div class="float-end">
                <button type="submit" class="btn btn-primary" (click)="saveCreateHoliday()">Save</button>
              </div>

            </form>
          </div>
        </div>
    </div>
  </div>
</div>
<!-- end add/edit model -->
